DATASET: MMRadarDataset
DATA_PATH: /mnt/e/Scholar/dataset/aiQiiDataset/radar_openpcdet
POINTS_DIR: points

POINT_CLOUD_RANGE: [-16, -20, -8, 64, 20, 8]

DATA_SPLIT: {
  'train': train,
  'test': val
}

INFO_PATH: {
  'train': [mmradar_infos_train.pkl],
  'test': [mmradar_infos_val.pkl],
}

POINT_FEATURE_ENCODING: {
  encoding_type: absolute_coordinates_encoding,
  used_feature_list: ['x', 'y', 'z', 'intensity'],
  src_feature_list: ['x', 'y', 'z', 'intensity'],
}

DATA_AUGMENTOR:
  DISABLE_AUG_LIST: ['placeholder']
  AUG_CONFIG_LIST:
    - NAME: random_world_flip
      ALONG_AXIS_LIST: ['y']
    - NAME: random_world_rotation
      WORLD_ROT_ANGLE: [-0.3925, 0.3925]
    - NAME: random_world_scaling
      WORLD_SCALE_RANGE: [0.95, 1.05]

DATA_PROCESSOR:
  - NAME: mask_points_and_boxes_outside_range
    REMOVE_OUTSIDE_BOXES: True
  - NAME: shuffle_points
    SHUFFLE_ENABLED: {
      'train': True,
      'test': False
    }
  - NAME: transform_points_to_voxels
    # aiQii drones are sub-meter (mean box ~0.47x0.44x0.19m). A 0.5m voxel with
    # feature_map_stride 2 gives a 1.0m BEV cell -- larger than the target box,
    # which quantizes the center and starves anchor matching. 0.2m -> 0.4m cell.
    VOXEL_SIZE: [0.2, 0.2, 16]
    MAX_POINTS_PER_VOXEL: 32
    MAX_NUMBER_OF_VOXELS: {
      'train': 12000,
      'test': 20000
    }
