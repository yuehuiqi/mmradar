DATASET: MMRadarDataset
DATA_PATH: /mnt/e/Scholar/dataset/mmaud/mmaud_radar_camera_openpcdet
POINTS_DIR: points
COORDINATE_TRANSFORM: camera_to_lidar

POINT_CLOUD_RANGE: [-16, -20, -8, 64, 20, 8]

DATA_SPLIT: {
  'train': train,
  'test': val
}

INFO_PATH: {
  'train': [mmradar_infos_train.pkl],
  'test': [mmradar_infos_val.pkl],
}

POINT_FEATURE_ENCODING: {
  encoding_type: absolute_coordinates_encoding,
  used_feature_list: ['x', 'y', 'z', 'intensity'],
  src_feature_list: ['x', 'y', 'z', 'intensity'],
}

DATA_AUGMENTOR:
  DISABLE_AUG_LIST: ['placeholder']
  AUG_CONFIG_LIST: []

DATA_PROCESSOR:
  - NAME: mask_points_and_boxes_outside_range
    REMOVE_OUTSIDE_BOXES: True
  - NAME: shuffle_points
    SHUFFLE_ENABLED: {
      'train': True,
      'test': False
    }
  - NAME: transform_points_to_voxels
    VOXEL_SIZE: [0.5, 0.5, 18]
    MAX_POINTS_PER_VOXEL: 32
    MAX_NUMBER_OF_VOXELS: {
      'train': 12000,
      'test': 20000
    }
