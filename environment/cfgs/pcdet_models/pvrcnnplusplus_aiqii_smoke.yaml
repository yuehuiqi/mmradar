      CLS_BG_THRESH: 0.20
      CLS_BG_THRESH_LO: 0.05
      REG_FG_THRESH: 0.35
  POST_PROCESSING:
    SCORE_THRESH: 0.05
    EVAL_METRIC: mmradar
