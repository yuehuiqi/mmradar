      REG_FG_THRESH: 0.35
  POST_PROCESSING:
    SCORE_THRESH: 0.05
    EVAL_METRIC: mmradar

OPTIMIZATION:
  BATCH_SIZE_PER_GPU: 2
  NUM_EPOCHS: 2
  LR: 0.003
