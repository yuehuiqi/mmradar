# DG-PFA ablation: no dynamic graph, aux attention only.
# Removes the DynamicPillarGraphBlock; keeps RadarAuxiliaryAttention.
# Used to isolate the contribution of the inter-pillar graph module.
_BASE_CONFIG_: /mnt/e/Scholar/mmradarDetect/environment/cfgs/pcdet_models/pfanet_mmaud_full.yaml

MODEL:
  VFE:
    NAME: DynamicGraphRadarPillarFeatureAttention
    NUM_HEADS: 2
    MEAN_POOL_SCALE: 0.5
    FINAL_FUSION_GATE_INIT: 0.25
    INFERENCE_FUSION_SCALE: 1.0

    GRAPH:
      NUM_LAYERS: 0          # disabled: no dynamic pillar graph
      K: 8
      NEIGHBOR_MODE: hybrid
      FEATURE_WEIGHT: 1.0
      POSITION_WEIGHT: 0.25
      POSITION_SCALE: 4.0
      QUERY_CHUNK_SIZE: 512
      USE_POSITION_DELTA: True
      USE_GLOBAL_CONTEXT: False
      RESIDUAL_SCALE: 0.5

    AUX_ATTENTION:
      ENABLED: True          # kept: motion/intensity/structure branches
      MAX_POINTS: 32
      MOTION_FEATURE_INDEX: -1
      INTENSITY_FEATURE_INDEX: -1
      USE_STRUCTURE: True
      USE_RANGE: False
      GATE_SCALE: 0.5
