MODEL:
  VFE:
    USE_VELOCITY_DECOMPOSITION: False
    USE_REL_VELOCITY_DECOMPOSITION: False
    USE_VELOCITY_OFFSET: False
    USE_REL_VELOCITY_OFFSET: False
    NUM_FILTERS: [32]
  DENSE_HEAD:
